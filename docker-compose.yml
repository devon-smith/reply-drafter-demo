services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    environment:
      - SITE_HOST=${SITE_HOST}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [reply-server]
  reply-server:
    build: .
    container_name: reply-server
    restart: unless-stopped
    env_file: .env
    expose: ["3000"]
    volumes:
      # Editable prompt + KB, read fresh per request — tweak without a rebuild.
      - ./prompt:/app/prompt:ro
      - ./kb:/app/kb:ro
volumes:
  caddy_data:
  caddy_config:
