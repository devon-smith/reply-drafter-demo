<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reply Drafter</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"
          onerror="window.__officeLoadError = true;"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <main id="app" aria-live="polite">
    <header class="head">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 7 4 12 9 17"></polyline>
          <path d="M4 12h11a5 5 0 0 1 5 5v0"></path>
        </svg>
      </div>
      <div>
        <h1>Reply Drafter</h1>
        <p class="sub">AI reply in your inbox</p>
      </div>
    </header>

    <section class="card" id="status-card">
      <p class="status" id="status">Starting...</p>
    </section>

    <section class="card readout" id="readout" hidden>
      <div class="row"><span class="k">From</span><span class="v" id="r-from">-</span></div>
      <div class="row"><span class="k">Subject</span><span class="v" id="r-subject">-</span></div>
    </section>

    <button class="btn primary" id="regen-btn" disabled>Regenerate</button>
    <p class="hint">Drafts automatically when the pane opens. Use Regenerate for a different version.</p>
  </main>

  <script>
    (function () {
      var statusEl, regenBtn, ready = false, mode = "read";
      var last = { fromName: "", subject: "", body: "" };

      function el(id) { return document.getElementById(id); }

      // Compose surfaces expose subject/body as writable objects (getAsync/setAsync);
      // on the read surface item.subject is a plain string.
      function isComposeItem(item) {
        return !!(item && item.subject && typeof item.subject.getAsync === "function");
      }
      function setStatus(msg, kind) {
        statusEl = statusEl || el("status");
        statusEl.textContent = msg;
        statusEl.className = "status" + (kind ? " " + kind : "");
      }

      function boot() {
        statusEl = el("status"); regenBtn = el("regen-btn");
        regenBtn.addEventListener("click", function () {
          if (mode === "compose") { if (last.body) generateAndInsert(); else runCompose(); }
          else { if (last.body) generate(); else runAll(); }
        });

        if (window.__officeLoadError) { setStatus("office.js failed to download.", "err"); return; }
        if (typeof Office === "undefined") { setStatus("office.js did not define Office.", "err"); return; }

        var timer = setTimeout(function () {
          if (!ready) setStatus("office.js never connected to the Outlook host (7s). Try the desktop app.", "err");
        }, 7000);

        try {
          Office.onReady(function (info) {
            ready = true; clearTimeout(timer);
            if (!info || info.host !== Office.HostType.Outlook) {
              setStatus("Running standalone - open this from inside Outlook.", "err"); return;
            }
            mode = isComposeItem(Office.context.mailbox.item) ? "compose" : "read";
            if (mode === "compose") runCompose();  // read draft + generate + insert in place
            else runAll();                         // read email + generate + open reply
          });
        } catch (e) { clearTimeout(timer); setStatus("Office.onReady error: " + ((e && e.message) || e), "err"); }
      }

      // Step 1: read the open email, then chain into generation.
      function runAll() {
        try {
          var item = Office.context.mailbox.item;
          if (!item) { setStatus("No message is open. Open an email and reopen the pane.", "err"); return; }
          last.subject = item.subject || "(no subject)";
          last.fromName = (item.from && item.from.displayName) || "there";
          el("r-from").textContent = last.fromName;
          el("r-subject").textContent = last.subject;
          el("readout").hidden = false;
          setStatus("Reading this email...", "");
          item.body.getAsync(Office.CoercionType.Text, function (result) {
            if (result.status === Office.AsyncResultStatus.Succeeded) {
              last.body = (result.value || "").trim();
              generate();
            } else { setStatus("Could not read the body: " + result.error.message, "err"); }
          });
        } catch (e) { setStatus("read error: " + ((e && e.message) || e), "err"); }
      }

      // Step 2: POST to the VPS, then open the reply pre-filled.
      async function generate() {
        try {
          regenBtn.disabled = true;
          setStatus("Generating reply with Claude...", "");
          var resp = await fetch("/draft", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ from: last.fromName, subject: last.subject, body: last.body })
          });
          if (!resp.ok) {
            var msg = "";
            try { msg = (await resp.json()).error || ""; } catch (e) { msg = "HTTP " + resp.status; }
            setStatus("Generation failed: " + msg, "err"); regenBtn.disabled = false; return;
          }
          var reply = ((await resp.json()).reply || "").trim();
          if (!reply) { setStatus("Empty reply returned.", "err"); regenBtn.disabled = false; return; }
          Office.context.mailbox.item.displayReplyForm(reply);
          setStatus("Draft reply opened. Edit and send, or Regenerate.", "ok");
          regenBtn.disabled = false;
        } catch (e) { setStatus("Network error calling /draft: " + ((e && e.message) || e), "err"); regenBtn.disabled = false; }
      }

      // COMPOSE path: read the already-open draft for context (it carries the quoted
      // thread), then generate and insert in place — no new window.
      function runCompose() {
        try {
          var item = Office.context.mailbox.item;
          if (!item) { setStatus("No draft is open.", "err"); return; }
          last.fromName = "";
          el("r-from").textContent = "(composing)";
          el("readout").hidden = false;
          setStatus("Reading the open draft...", "");
          item.subject.getAsync(function (sres) {
            last.subject = (sres.status === Office.AsyncResultStatus.Succeeded && sres.value) || "(no subject)";
            el("r-subject").textContent = last.subject;
            item.body.getAsync(Office.CoercionType.Text, function (bres) {
              if (bres.status === Office.AsyncResultStatus.Succeeded) {
                last.body = (bres.value || "").trim();
                if (!last.body) { setStatus("The draft is empty - reply to a message first, then draft.", "err"); return; }
                generateAndInsert();
              } else { setStatus("Could not read the draft: " + bres.error.message, "err"); }
            });
          });
        } catch (e) { setStatus("compose read error: " + ((e && e.message) || e), "err"); }
      }

      // COMPOSE step 2: POST to the VPS, then insert the reply into the open draft body.
      async function generateAndInsert() {
        try {
          regenBtn.disabled = true;
          setStatus("Generating reply with Claude...", "");
          var resp = await fetch("/draft", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ from: last.fromName, subject: last.subject, body: last.body })
          });
          if (!resp.ok) {
            var msg = "";
            try { msg = (await resp.json()).error || ""; } catch (e) { msg = "HTTP " + resp.status; }
            setStatus("Generation failed: " + msg, "err"); regenBtn.disabled = false; return;
          }
          var reply = ((await resp.json()).reply || "").trim();
          if (!reply) { setStatus("Empty reply returned.", "err"); regenBtn.disabled = false; return; }
          Office.context.mailbox.item.body.setAsync(reply, { coercionType: Office.CoercionType.Text }, function (ins) {
            if (ins.status === Office.AsyncResultStatus.Succeeded) {
              setStatus("Draft inserted. Edit and send, or Regenerate.", "ok");
            } else {
              setStatus("Could not insert the draft: " + ins.error.message, "err");
            }
            regenBtn.disabled = false;
          });
        } catch (e) { setStatus("Network error calling /draft: " + ((e && e.message) || e), "err"); regenBtn.disabled = false; }
      }

      if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
      else boot();
    })();
  </script>
</body>
</html>
